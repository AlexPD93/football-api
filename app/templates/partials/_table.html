<div id="data-table">
    {% if rows %}
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        {% for header in headers %}
                            <th>{{ header }}</th>
                        {% endfor %}
                        {% if role == 'admin' %}
                            <th style="width: 80px;">Action</th>
                        {% endif %}
                    </tr>
                </thead>
                <tbody id="table-body">
                    {% for row in rows %}
                        {% include "partials/_table_row.html" %}
                    {% endfor %}
                </tbody>
            </table>
        </div>
    {% else %}
        <div style="text-align: center; padding: 3rem; color: var(--text-secondary);">
            <p>No data available yet.</p>
        </div>
    {% endif %}
</div>
