{% extends "base.html" %}

{% block content %}
    <nav class="top-nav">
        <div class="nav-container">
            <div class="logo-text">TUESDAY FOOTBALL</div>
            <div class="user-actions">
                {% if role == "admin" %}
                    <span class="badge-admin">Admin</span>
                    <a href="/logout" class="btn-auth btn-logout">Logout</a>
                {% else %}
                    <a href="/login" class="btn-auth btn-login">Login with Google</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container">
        {% if error_message %}
            <div class="error-banner" id="error-banner">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                <span><strong>Error:</strong> {{ error_message }}</span>
            </div>
            <script>
                setTimeout(() => {
                    const banner = document.getElementById('error-banner');
                    if (banner) {
                        banner.style.transition = 'opacity 0.5s ease-out';
                        banner.style.opacity = '0';
                        setTimeout(() => banner.remove(), 500);
                    }
                }, 3000);
            </script>
        {% endif %}

        <div class="dashboard-card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2.5rem;">
                <div class="tabs-pill" style="margin-bottom: 0;">
                    <button class="tab-button active" hx-get="goals" hx-target="#tab-content" hx-trigger="click">Goals Scored</button>
                    <button class="tab-button" hx-get="wins" hx-target="#tab-content" hx-trigger="click">Games Won</button>
                </div>
                
                {% if role == 'admin' %}
                <button class="btn-primary" 
                        hx-get="/new-player-modal" 
                        hx-target="#modal-container"
                        hx-vals='js:{table_type: document.querySelector(".tab-button.active").innerText.includes("Goals") ? "goals" : "wins"}'>
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    Add Player
                </button>
                {% endif %}
            </div>

            <div id="tab-content" hx-get="goals" hx-trigger="load">
                <div style="display: flex; justify-content: center; padding: 4rem;">
                    <div class="loading-spinner"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Placeholder -->
    <div id="modal-container"></div>
{% endblock %}
